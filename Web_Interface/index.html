<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Judicial Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index_style.css">
</head>
<body>

<header id="main-header">
    <h1>المساعد الآلي</h1>
</header>

<main id="form-main">
    <div id="form-div">
        <div class="input-group">
            <label for="name">الاسم:</label>
            <input type="text" id="name" name="name" placeholder="اكتب الاسم..." required>
        </div>
        <div class="input-group">
            <label for="national-id">رقم الهوية:</label>
            <input type="text" id="national-id" name="national-id" placeholder="اكتب رقم الهوية..." required>
        </div>
        <div class="input-group">
            <p>الرجاء ادخال صورة أو ملف pdf</p>
            <!-- accept is NOT safe, validate in the backend -->
            <label class="file-upload-btn">
                <input id="pdf-input" type="file" name="file" accept=".pdf,image/*" multiple required>
                Choose file
            </label>
            <p id="chosen-files"></p>
        </div>
        <button class="upload" id="submit"> رفع الملف </button>
        <div class="loading-container">
            <div class="loading" hidden></div>
        </div>
        
        <div class="status error">
            <p id="status-text"></p>
        </div>
    </div>
</main>

<footer>
    <p dir="ltr">© 2026 All Rights Reserved</p>
</footer>

<script src="index_script.js"></script>
</body>
</html>
