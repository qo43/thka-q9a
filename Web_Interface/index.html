<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Judicial Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index_style.css">
</head>
<body>

<header id="main-header">
    <h1>المساعد الآلي</h1>
</header>

<main id="form-main">
    <div id="form-div">
        <div class="input-group">
            <label for="name">الاسم:</label>
            <input type="text" id="name" name="name" placeholder="اكتب الاسم...">
        </div>
        <div class="input-group">
            <label for="national-id">رقم الهوية:</label>
            <input type="text" id="national-id" name="national-id" placeholder="اكتب رقم الهوية...">
        </div>
        <div class="input-group">
            <label for="date">تاريخ الشكوى:</label>
            <input type="date" id="date" name="date" placeholder="اكتب رقم الهوية...">
        </div>
        <div class="input-group">
            <p>الرجاء ادخال صورة أو ملف pdf</p>
            <!-- accept is NOT safe, validate in the backend -->
            <input id="pdf-input" type="file" name="file" accept=".pdf,image/*">
            <button class="upload" id="pdf-upload-btn"> رفع الملف </button>
        </div>
    </div>
</main>

<footer>
    <p dir="ltr">© 2026 All Rights Reserved</p>
</footer>

<script src="index_script.js"></script>
</body>
</html>
