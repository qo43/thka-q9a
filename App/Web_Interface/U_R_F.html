<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نتيجة المعالجة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="U_R_F.css">
</head>
<body>

<div class="bg-mesh-1"></div>
<div class="bg-mesh-2"></div>

<div class="app-container">
    
    <header>
        <div class="logo-area">
            <h1>📄 تقرير التدقيق</h1>
            <p class="subtitle">نتيجة التحليل الآلي للبيانات</p>
        </div>
    </header>

    <main>
        
        <div class="glass-card main-card">
            
            <div class="card-top-bar">
                <div class="status-badge success">
                    <span class="pulse-dot"></span> <span>مكتمل بنجاح</span>
                </div>
                <div class="date-badge" id="date-display">2026-01-21</div>
            </div>

            <div class="document-viewer">
                <div class="viewer-header">
                    <span class="doc-title">output_text.txt</span>
                    <button class="icon-btn" id="btn-copy" title="نسخ النص">📋</button>
                </div>
                <div class="viewer-body" id="ai-text-container">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>

            <div class="actions-grid">
                <button id="btn-accept" class="btn-primary">
                    ✅ اعتماد النتيجة
                </button>
                <button id="btn-refine" class="btn-glass">
                    💬 طلب تعديل (AI Chat)
                </button>
            </div>
        </div>

        <div id="chat-section" class="glass-card chat-interface" hidden>
            
            <div class="chat-header">
                <div class="bot-info">
                    <div class="bot-avatar">🤖</div>
                    <div>
                        <h3>المساعد الذكي</h3>
                        <span class="bot-status">متصل الآن</span>
                    </div>
                </div>
                <button id="close-chat" class="icon-btn-close">✕</button>
            </div>
            
            <div class="chat-messages" id="chat-history">
                <div class="message ai">
                    <div class="bubble">كيف يمكنني تحسين النص لك؟</div>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <textarea id="chat-input" placeholder="اكتب طلبك هنا..." rows="1"></textarea>
                <button id="send-msg" class="btn-send">➤</button>
            </div>
        </div>

    </main>

    <footer>
        <p dir="ltr">© 2026 Judicial Helper System</p>
    </footer>
</div>

<script src="results_script.js"></script>
</body>
</html>
