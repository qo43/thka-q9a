<!DOCTYPE html>
<html>
    <head>
        <title>Wathiq OCR Test</title>
    </head>
    <body>
        <h1>Simple OCR Test</h1>

        <input type="file" id="fileInput">

        <button onclick="sendData()">Upload and Check</button>
    
        <hr>

        <h3>OCR result:</h3>
        <pre id="output">Waiting...</pre>

        <script>
            async function sendData() {
                let file = document.getElementById("fileInput").files[0];
                if(!file) {alert("Please upload a file!"); return;}

                let formData = new FormData();
                formData.append("file", file);

                try{
                    let response = await fetch('/api/scan' , {
                        method: 'POST',
                        body: formData
                    });

                    let json = await response.json();

                    document.getElementById("output").innerText = JSON.stringify(json, null, 2);
                } catch(e){
                    document.getElementById("output").innerText = "Error: " + e;
                }
            }
        </script>
    </body>
</html>
